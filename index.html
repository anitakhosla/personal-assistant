<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Assistant</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 2rem;
        background: #f5f5f5;
        color: #222;
      }

      h1 {
        margin: 0 0 1.5rem 0;
        font-size: 1.75rem;
      }

      .categories {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .category {
        padding: 1.5rem;
        border-radius: 8px;
        color: white;
      }

      .category h2 {
        margin: 0;
        font-size: 1.25rem;
      }

      .career  { background: #2b6cb0; }
      .health  { background: #2f855a; }
      .hobbies { background: #b7791f; }
    </style>
  </head>

  <body>
    <h1>Personal Assistant</h1>

    <div class="categories">
      <div class="category career">
        <h2>Career</h2>
      </div>

      <div class="category health">
        <h2>Health</h2>
      </div>

      <div class="category hobbies">
        <h2>Hobbies</h2>
      </div>
    </div>
  </body>
</html>
