<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Assistant</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 2rem;
        background: #f5f5f5;
        color: #222;
      }

      h1 {
        margin: 0 0 1.5rem 0;
        font-size: 1.75rem;
      }

      .capture {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .capture input {
        flex: 1;
        padding: 0.75rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      .capture select {
        padding: 0.75rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: white;
      }

      .capture button {
        padding: 0.75rem 1.25rem;
        font-size: 1rem;
        background: #222;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .categories {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .category {
        padding: 1.5rem;
        border-radius: 8px;
        color: white;
      }

      .category h2 {
        margin: 0 0 0.75rem 0;
        font-size: 1.25rem;
      }

      .category ul {
        margin: 0;
        padding-left: 1.25rem;
      }

      .category li {
        margin: 0.25rem 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .task-text {
        flex: 1;
        cursor: text;
      }

      .task-edit {
        flex: 1;
        padding: 0.25rem 0.5rem;
        border: none;
        border-radius: 4px;
        font: inherit;
        background: rgba(255, 255, 255, 0.92);
        color: #222;
      }

      .delete-btn {
        background: transparent;
        color: rgba(255, 255, 255, 0.7);
        border: none;
        border-radius: 4px;
        padding: 0 0.5rem;
        cursor: pointer;
        font-size: 1.25rem;
        line-height: 1;
      }

      .delete-btn:hover,
      .delete-btn:focus-visible {
        background: rgba(0, 0, 0, 0.25);
        color: #fff;
        outline: none;
      }

      .career   { background: #2b6cb0; }
      .health   { background: #2f855a; }
      .hobbies  { background: #b7791f; }
      .finances { background: #0e7490; }
      .social   { background: #be185d; }
      .home     { background: #6d28d9; }
      .family   { background: #9f1239; }
      .growth   { background: #475569; }
    </style>
  </head>

  <body>
    <h1>Personal Assistant</h1>

    <div class="capture">
      <input id="task-input" type="text" placeholder="What's on your mind?" />
      <select id="category-select" aria-label="Category">
        <option value="career">Career/Work</option>
        <option value="health">Health</option>
        <option value="hobbies">Hobbies/Interests</option>
        <option value="finances">Finances</option>
        <option value="social">Social</option>
        <option value="home">Home</option>
        <option value="family">Family</option>
        <option value="growth">Personal Growth</option>
      </select>
      <button id="add-button">Add</button>
    </div>

    <div class="categories">
      <div class="category career">
        <h2>Career/Work</h2>
        <ul id="career-list"></ul>
      </div>

      <div class="category health">
        <h2>Health</h2>
        <ul id="health-list"></ul>
      </div>

      <div class="category hobbies">
        <h2>Hobbies/Interests</h2>
        <ul id="hobbies-list"></ul>
      </div>

      <div class="category finances">
        <h2>Finances</h2>
        <ul id="finances-list"></ul>
      </div>

      <div class="category social">
        <h2>Social</h2>
        <ul id="social-list"></ul>
      </div>

      <div class="category home">
        <h2>Home</h2>
        <ul id="home-list"></ul>
      </div>

      <div class="category family">
        <h2>Family</h2>
        <ul id="family-list"></ul>
      </div>

      <div class="category growth">
        <h2>Personal Growth</h2>
        <ul id="growth-list"></ul>
      </div>
    </div>

    <script>
      const CATEGORIES = [
        "career",
        "health",
        "hobbies",
        "finances",
        "social",
        "home",
        "family",
        "growth",
      ];

      const STORAGE_KEY = "personal-assistant.tasks.v1";
      const STORAGE_VERSION = 1;

      function newId() {
        if (typeof crypto !== "undefined" && crypto.randomUUID) {
          return crypto.randomUUID();
        }
        return `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      }

      const input = document.querySelector("#task-input");
      const categorySelect = document.querySelector("#category-select");
      const button = document.querySelector("#add-button");

      const tasks = [];

      function load() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        try {
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return;
          if (parsed.version !== STORAGE_VERSION) {
            console.warn(`Ignoring stored data with version ${parsed.version}`);
            return;
          }
          if (!Array.isArray(parsed.tasks)) return;
          const valid = parsed.tasks.filter(
            (t) =>
              t &&
              typeof t.text === "string" &&
              CATEGORIES.includes(t.category),
          );
          tasks.push(...valid);
        } catch (e) {
          console.error("Failed to load tasks from localStorage", e);
        }
      }

      function save() {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({ version: STORAGE_VERSION, tasks }),
        );
      }

      function render() {
        for (const slug of CATEGORIES) {
          document.querySelector(`#${slug}-list`).innerHTML = "";
        }
        for (const task of tasks) {
          const list = document.querySelector(`#${task.category}-list`);
          if (!list) continue;

          const item = document.createElement("li");
          item.dataset.id = task.id;

          const textSpan = document.createElement("span");
          textSpan.className = "task-text";
          textSpan.textContent = task.text;

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "delete-btn";
          deleteBtn.setAttribute("aria-label", "Delete task");
          deleteBtn.textContent = "×";

          item.appendChild(textSpan);
          item.appendChild(deleteBtn);
          list.appendChild(item);
        }
      }

      function addTask() {
        const text = input.value.trim();
        if (text === "") return;

        tasks.push({
          id: newId(),
          text,
          category: categorySelect.value,
          createdAt: new Date().toISOString(),
          lens: "you",
        });

        input.value = "";
        save();
        render();
      }

      function startEdit(li, id, textSpan) {
        const task = tasks.find((t) => t.id === id);
        if (!task) return;

        const editInput = document.createElement("input");
        editInput.type = "text";
        editInput.className = "task-edit";
        editInput.value = task.text;

        li.replaceChild(editInput, textSpan);
        editInput.focus();
        editInput.select();

        let done = false;

        function restoreSpan() {
          const newSpan = document.createElement("span");
          newSpan.className = "task-text";
          newSpan.textContent = task.text;
          editInput.replaceWith(newSpan);
        }

        function commit() {
          if (done) return;
          done = true;
          const newText = editInput.value.trim();
          // Empty edit reverts to original text (treat as cancel, not delete).
          if (newText && newText !== task.text) {
            task.text = newText;
            save();
          }
          restoreSpan();
        }

        function cancel() {
          if (done) return;
          done = true;
          restoreSpan();
        }

        editInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            commit();
          } else if (e.key === "Escape") {
            e.preventDefault();
            cancel();
          }
        });

        editInput.addEventListener("blur", commit);
      }

      const categoriesEl = document.querySelector(".categories");

      categoriesEl.addEventListener("click", (e) => {
        const li = e.target.closest("li[data-id]");
        if (!li) return;
        const id = li.dataset.id;

        if (e.target.classList.contains("delete-btn")) {
          const task = tasks.find((t) => t.id === id);
          if (!task) return;
          const preview =
            task.text.length > 80 ? task.text.slice(0, 77) + "..." : task.text;
          if (!confirm(`Delete: "${preview}"?`)) return;
          const idx = tasks.findIndex((t) => t.id === id);
          if (idx !== -1) {
            tasks.splice(idx, 1);
            save();
            render();
          }
          return;
        }

        if (e.target.classList.contains("task-text")) {
          startEdit(li, id, e.target);
        }
      });

      button.addEventListener("click", addTask);

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          addTask();
        }
      });

      load();
      render();
    </script>
  </body>
</html>
